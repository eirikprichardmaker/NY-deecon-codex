version: 1
mapping_name: esef_ifrs_default_conservative
source_taxonomy: IFRS full + ESEF common practice extensions
rules:
  aggregation_policy:
    revenue_total:
      when_components_only: sum confident components if no explicit total revenue fact exists
      candidates: [ifrs-full:Revenue, ifrs-full:RevenueFromContractsWithCustomers]
    capex_purchase_ppe:
      when_disclosed_gross_and_net: prefer gross purchases of PPE cash outflow
    net_finance_income_expense:
      fallback: finance_income + finance_costs
  ambiguity_notes:
    - Do not map issuer-specific extension tags by default without anchored IFRS concept.
    - Only map facts with clear sign and period type consistency.
    - Insurance IFRS 17 tags can vary; prefer clearly labeled base IFRS concepts.

mappings:
  - concept: ifrs-full:Revenue
    field_id: revenue_total
    confidence: high
    notes: Standard top-line revenue concept.
  - concept: ifrs-full:RevenueFromContractsWithCustomers
    field_id: revenue_total
    confidence: high
    notes: IFRS 15 revenue concept.
  - concept: ifrs-full:CostOfSales
    field_id: cost_of_goods_sold
    confidence: high
    notes: Standard cost of sales mapping.
  - concept: ifrs-full:GrossProfit
    field_id: gross_profit
    confidence: high
    notes: Direct gross profit concept.
  - concept: ifrs-full:OtherOperatingIncome
    field_id: non_operating_income_expense
    confidence: medium
    notes: Use cautiously due to issuer diversity.
  - concept: ifrs-full:AdministrativeExpense
    field_id: sga_expense
    confidence: medium
    notes: May represent part of SG&A only.
  - concept: ifrs-full:DepreciationExpense
    field_id: depreciation_expense
    confidence: high
    notes: Direct depreciation concept.
  - concept: ifrs-full:AmortisationExpense
    field_id: amortization_expense
    confidence: high
    notes: Direct amortization concept.
  - concept: ifrs-full:OperatingProfitLoss
    field_id: operating_income_ebit
    confidence: high
    notes: Preferred EBIT anchor.
  - concept: ifrs-full:ProfitLossBeforeTax
    field_id: profit_before_tax
    confidence: high
    notes: Standard pre-tax income.
  - concept: ifrs-full:IncomeTaxExpenseContinuingOperations
    field_id: income_tax_expense
    confidence: high
    notes: Use continuing operations tax expense when available.
  - concept: ifrs-full:ProfitLoss
