version: 1
name: nordic_computed_metrics_v1
metrics:
  - metric_id: nopat
    label: Net operating profit after tax
    sector: all
    formula: operating_income_ebit * (1 - effective_tax_rate)
    dependencies: [operating_income_ebit, income_tax_expense, profit_before_tax]
    notes: Use normalized tax rate from income_tax_expense / profit_before_tax with safeguards.

  - metric_id: roic_reported_capital
    label: Return on invested capital (reported capital)
    sector: all
    formula: nopat / avg_invested_capital_reported
    dependencies: [nopat, total_equity, short_term_debt, long_term_debt, lease_liabilities_current, lease_liabilities_noncurrent, cash_and_cash_equivalents]
    notes: Invested capital includes lease liabilities and excludes excess cash.

  - metric_id: roic_tangible_capital
    label: Return on invested capital (tangible capital)
    sector: all
    formula: nopat / avg_invested_capital_tangible
    dependencies: [nopat, total_equity, goodwill, intangible_assets, short_term_debt, long_term_debt, lease_liabilities_current, lease_liabilities_noncurrent, cash_and_cash_equivalents]
    notes: Tangible variant subtracts goodwill and intangibles from invested capital.

  - metric_id: roe
    label: Return on equity
    sector: all
    formula: net_income_attributable_to_parent / avg_equity_attributable_to_parent
    dependencies: [net_income_attributable_to_parent, equity_attributable_to_parent]
    notes: For banks and insurers this is a key valuation anchor.

  - metric_id: fcf
    label: Free cash flow to firm proxy (CFO - capex)
    sector: all
    formula: cash_flow_from_operations + capex_purchase_ppe + capex_purchase_intangibles
    dependencies: [cash_flow_from_operations, capex_purchase_ppe, capex_purchase_intangibles]
    notes: Capex fields are negative by sign convention.

  - metric_id: fcff
    label: Free cash flow to firm
    sector: all
    formula: nopat + depreciation_expense + amortization_expense - capex_gross - delta_nwc
    dependencies: [nopat, depreciation_expense, amortization_expense, capex_purchase_ppe, capex_purchase_intangibles, accounts_receivable, inventory, accounts_payable, other_current_assets]
    notes: Use change in working capital from balance sheet deltas when cash flow detail is unavailable.

  - metric_id: net_debt_incl_leases
    label: Net debt including leases
    sector: all
    formula: short_term_debt + long_term_debt + lease_liabilities_current + lease_liabilities_noncurrent - cash_and_cash_equivalents - short_term_investments
    dependencies: [short_term_debt, long_term_debt, lease_liabilities_current, lease_liabilities_noncurrent, cash_and_cash_equivalents, short_term_investments]
    notes: Preferred for EV bridge under IFRS 16.

  - metric_id: net_debt_excl_leases
    label: Net debt excluding leases
    sector: all
    formula: short_term_debt + long_term_debt - cash_and_cash_equivalents - short_term_investments
    dependencies: [short_term_debt, long_term_debt, cash_and_cash_equivalents, short_term_investments]
    notes: Legacy comparability metric for pre-IFRS16 style analysis.

  - metric_id: nd_to_ebitda
    label: Net debt to EBITDA
    sector: all
    formula: net_debt_incl_leases / ebitda
    dependencies: [net_debt_incl_leases, ebitda]
    notes: Fallback to operating_income_ebit + depreciation_expense + amortization_expense if EBITDA missing.

  - metric_id: gp_to_assets
    label: Gross profit to assets
    sector: all
    formula: gross_profit / avg_total_assets
    dependencies: [gross_profit, total_assets]
    notes: Profitability factor used in quality strategies.

  - metric_id: ebit_margin
    label: EBIT margin
    sector: all
    formula: operating_income_ebit / revenue_total
    dependencies: [operating_income_ebit, revenue_total]
    notes: Core industrial operating profitability margin.

  - metric_id: fcf_margin
    label: FCF margin
    sector: all
    formula: fcf / revenue_total
    dependencies: [fcf, revenue_total]
    notes: Cash conversion margin proxy.

  - metric_id: net_margin
    label: Net margin
    sector: all
    formula: net_income_attributable_to_parent / revenue_total
    dependencies: [net_income_attributable_to_parent, revenue_total]
    notes: Net profitability after financing and taxes.

  - metric_id: accruals_proxy
    label: Accruals proxy
    sector: all
    formula: (net_income - cash_flow_from_operations) / avg_total_assets
    dependencies: [net_income, cash_flow_from_operations, total_assets]
    notes: Lower accruals generally indicates higher earnings quality.

  - metric_id: payout_total
    label: Total payout ratio
    sector: all
    formula: (abs(dividends_paid_total) + abs(share_buybacks_paid)) / net_income_attributable_to_parent
    dependencies: [dividends_paid_total, share_buybacks_paid, net_income_attributable_to_parent]
    notes: Captures shareholder distributions from both dividends and buybacks.

  - metric_id: dilution_rate
    label: Share dilution rate
    sector: all
    formula: (shares_outstanding_diluted - shares_outstanding_basic) / shares_outstanding_basic
    dependencies: [shares_outstanding_basic, shares_outstanding_diluted]
    notes: Positive values indicate potential dilution.

  - metric_id: bank_nim
    label: Net interest margin
    sector: bank
    formula: bank_net_interest_income / avg_interest_earning_assets
    dependencies: [bank_net_interest_income, bank_total_assets]
    notes: Uses average interest-earning assets placeholder where full split unavailable.

  - metric_id: bank_credit_cost_ratio
    label: Credit cost ratio
    sector: bank
    formula: bank_loan_loss_provisions / avg_bank_total_loans_gross
    dependencies: [bank_loan_loss_provisions, bank_total_loans_gross]
    notes: ECL intensity metric for bank risk profiling.

  - metric_id: insurance_combined_ratio
    label: Combined ratio
    sector: insurance
    formula: (abs(ins_claims_incurred) + abs(ins_acquisition_costs) + abs(ins_operating_expenses)) / ins_earned_premiums
    dependencies: [ins_claims_incurred, ins_acquisition_costs, ins_operating_expenses, ins_earned_premiums, ins_combined_ratio_reported]
    notes: Prefer reported ratio if available; otherwise derive from components.

  - metric_id: wacc_input_rf
    label: Risk-free rate input
    sector: all
    formula: placeholder
    dependencies: []
    notes: Placeholder for valuation engine, sourced from market data at run time.

  - metric_id: wacc_input_erp
    label: Equity risk premium input
    sector: all
    formula: placeholder
    dependencies: []
    notes: Placeholder for valuation engine.

  - metric_id: wacc_input_beta
    label: Levered beta input
    sector: all
    formula: placeholder
    dependencies: []
    notes: Placeholder for valuation engine.

  - metric_id: coe
    label: Cost of equity
    sector: all
    formula: wacc_input_rf + wacc_input_beta * wacc_input_erp
    dependencies: [wacc_input_rf, wacc_input_beta, wacc_input_erp]
    notes: CAPM-form cost of equity placeholder.

  - metric_id: wacc
    label: Weighted average cost of capital
    sector: all
    formula: coe * equity_weight + after_tax_cod * debt_weight
    dependencies: [coe, finance_costs, income_tax_expense, profit_before_tax, short_term_debt, long_term_debt, lease_liabilities_current, lease_liabilities_noncurrent, total_equity]
    notes: Placeholder requires market value weights and effective debt cost calibration.
