paths:
  runs_dir: runs
  data_dir: data
  raw_dir: data/raw
  processed_dir: data/processed

includes:
  sources: configs/sources.yaml
  thresholds: configs/thresholds.yaml

market_index_ticker: "^OSEAX"

ir_reports:
  mapping_csv: config/ir_sources.csv
  rate_limit_sec: 1.0
  timeout_sec: 20

wft:
  use_pit_fundamentals: true       # STEG 1: use fundamentals_history.parquet for PIT
  fundamental_pub_lag_days: 90     # days from quarter period-end to public availability

wft_opt_strategy_a:
  weights_prior:
    quality: 0.35   # ↑ fra 0.27 — STEG 3: GP/A lagt til quality-gruppe
    value: 0.30     # ↓ fra 0.46 — var for dominant; mer balansert mot quality
    lowrisk: 0.20   # ↑ fra 0.19
    balance: 0.15   # ↑ fra 0.08
  weights_bounds: [0.0, 0.7]
  weights_reg_lambda: 0.5

decision:
  quality_strategy: strategy_a
  dividend_min_score: 0
  mos_min: 0.35       # WFT-optimal (var implisitt 0.30)
  mos_floor_by_confidence:
    high: 0.35        # DCF — standard threshold
    medium: 0.40      # EPV — zero-growth model, needs extra margin
    low: 0.50         # Multiples — sector median, needs large margin
  mad_min: -0.02      # WFT-optimal (var -0.05)
  # Dynamic MoS: top-quartile quality companies get a discount on MoS requirement
  mos_quality_discount: 0.10             # pp reduction for quality > P75
  mos_quality_discount_percentile: 0.75  # quality percentile threshold
  mos_dynamic_floor: 0.25               # never reduce MoS below this
  # Dynamic MAD: bear regime tightens the individual stock MAD floor
  bear_index_mad_threshold: -0.05       # index_mad below this → bear regime
  bear_stock_mad_min: 0.00              # minimum stock MAD in bear regime
  max_positions: 3    # STEG 5: max simultaneous positions (MoS-weighted allocation)
  min_hold_months: 3  # hold position for at least N months before switching
  max_price_age_days: 7
  min_fresh_price_coverage: 0.50
  candidate_required_fields:
    - intrinsic_value
    - market_cap
    - mos
    - mos_req
    - quality_score
    - roic_wacc_spread
    - adj_close
    - ma200
    - mad
    - index_price
    - index_ma200
  candidate_min_required_fields: 8
  candidate_min_required_ratio: 0.75
  value_qc:
    enabled: true
    min_samples_for_distribution: 30
    iqr_multiplier: 3.0
  data_quality:
    outlier_min_samples: 10
    outlier_mad_threshold: 6.0
    stale_fundamentals_days: 450
    # DQ-EVEBIT-GLOBAL: EV/EBIT floor for all non-bank companies (not just cyclicals).
    # Motivation: boom-inflated FCF gives high MoS even when EV/EBIT is low (DEDI 2024: EV/EBIT=5.96, MoS=94%).
    ev_ebit_floor_global: 6.0
    # DQ-MCAP-MIN: minimum market cap in local currency absolute units.
    # NOTE: market_cap in snapshot is stored in local currency (EUR for Finnish, SEK for Swedish, NOK for Norwegian).
    # These thresholds are EUR-calibrated — for SEK/NOK stocks they represent a much lower EUR-equivalent floor.
    mcap_min_hard: 50_000_000      # FAIL below this (< 50M EUR; < ~575M SEK equivalent)
    mcap_min_warn: 100_000_000     # WARN between hard and this (50–100M EUR)
    # DQ-MOS-SUSPECT: flag suspiciously high MoS when EV/EBIT is also low (likely boom-FCF artifact).
    mos_suspect_threshold: 0.80    # MoS > 80% triggers check
    mos_suspect_evebit_min: 8.0    # require EV/EBIT >= 8 when MoS > 80%
  media_red_flags:
    enabled: true
    days_back: 30
    max_headlines: 30
    terms:
      - bankrupt
      - bankruptcy
      - insolvency
      - investigation
      - fraud
      - lawsuit
      - warning
      - profit warning
      - guidance cut
      - downgrade
      - delisting
      - rights issue
      - dilution
      - loss
      - operating loss
      - covenant breach
      - liquidity crisis
      - accounting

refresh_prices_daily:
  min_universe_coverage: 0.60
  min_relative_coverage_vs_existing: 0.80
  max_absolute_coverage_drop_vs_existing: 0.15

financials_enrichment:
  enabled: true
  tiers_config: config/financials_field_tiers.yaml
  include_reports_y_bridge: true

cyclicality:
  # Damodaran sector labels that trigger cyclical guards.
  # Source: instrument_metadata.parquet / damodaran_sector column.
  cyclical_damodaran_sectors:
    - Materials    # steel, metals, mining, chemicals (e.g. SSAB, Yara, Boliden)
    - Oil & Gas    # energy exploration & production (e.g. Equinor, Aker BP)
    - Shipping     # dry bulk, tankers, car carriers
    - Seafood      # salmon, white fish (e.g. SalMar, Mowi)
  # FCF normalization window for cyclicals (years) — longer to dilute peak-cycle earnings
  fcf_window_years: 5          # vs default 3yr for non-cyclicals
  default_fcf_window_years: 3
  # EV/EBIT floor: cheap-looking cyclicals near cycle peak have low EV/EBIT
  ev_ebit_floor: 6.0           # require EV/EBIT >= 6 for cyclicals
  # Stricter MoS gate — cyclicals need more buffer against mean reversion
  mos_threshold: 0.40          # 40% MoS required (vs standard 30%)

valuation:
  prefer_quarterly_reports: true
  require_quarterly_reports: true
  max_quarterly_report_age_days: 220
  use_normalized_fcf: true
  fallback_chain: [dcf, epv, multiples]
  epv:
    enabled: true
    default_tax_rate: 0.22          # Nordic average; overridden per-country in cost_of_capital
  multiples:
    enabled: true
    min_peers: 5                    # minimum peers in sector to trust median
    haircut: 0.20                   # 20% discount on sector median EV/EBIT
    ev_ebit_range: [1, 50]          # filter extreme multiples before computing median

cost_of_capital:
  # Risk-free rate mode: 'country' uses per-country govt bond yields; 'nordic_single' uses one rate
  rf_mode: country
  nordic_single_rf: 0.035
  country_rf:
    Norway:  0.040   # 10y Norwegian govt bond
    Sweden:  0.025   # 10y Swedish govt bond
    Denmark: 0.030   # 10y Danish govt bond
    Finland: 0.030   # 10y Finnish/euro bond

  erp: 0.050         # Nordic equity risk premium

  # Country-specific corporate tax rates
  country_tax:
    Norway:  0.22
    Sweden:  0.206
    Denmark: 0.22
    Finland: 0.20
  tax_rate_default: 0.22

  # Beta computation from monthly log-returns vs country index
  beta_lookback_months: 36   # preferred lookback
  beta_warn_months: 24       # use with WARN if history 24–35m
  beta_fail_months: 12       # fall back to T3/T4 if history < 24m; FAIL if < 12m
  beta_clamp_low:  0.3
  beta_clamp_high: 2.5

  # WACC output bounds
  wacc_min: 0.060
  wacc_max: 0.180
  wacc_fallback: 0.090

  # Cost of debt: spread above risk-free rate, bucketed by ND/EBITDA
  cod_spreads:
    net_cash:         0.010   # ND < 0 — net cash company
    nd_ebitda_0_1:    0.015   # solid interest coverage
    nd_ebitda_1_2:    0.020
    nd_ebitda_2_3:    0.025
    nd_ebitda_3_4:    0.035
    nd_ebitda_4_6:    0.050   # high leverage — WARN
    nd_ebitda_gt6:    0.075   # extreme leverage
    no_data:          0.040   # unknown leverage — conservative default + WARN
